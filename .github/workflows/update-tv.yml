name: Vodafone.gr EPG Builder v18.04 2026

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-tv:
    runs-on: ubuntu-latest

    env:
      TZ: Europe/Athens

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install xmlbuilder2

      - name: Create data folder
        run: mkdir -p data

      - name: Fetch Vodafone JSON (multi-day EPG)
        run: |
          for i in {0..6}
          do
            DATE=$(date -d "+$i day" +'%Y-%m-%d')
            echo "Fetching $DATE"

            curl -s -L \
              --connect-timeout 1000 \
               --max-time 3000 \
                --retry 10 \
                --retry-delay 5 \
                  "https://www.vodafone.gr/api/tv/programma-live/$DATE" \
                    -o "data/raw_$DATE.json"

            # αν το αρχείο είναι άδειο, διαγραφή
            if [ ! -s "data/raw_$DATE.json" ]; then
              echo "No data for $DATE"
              rm -f "data/raw_$DATE.json"
            fi
          done

      - name: Generate XMLTV + M3U
        run: node scripts/generate.js

      - name: Commit & push
        run: |
          git config user.name "epg-bot"
          git config user.email "bot@example.com"

          git add data/

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "EPG update $(date +'%Y-%m-%d %H:%M')"
          git push
