name: Vodafone.gr EPG Builder v17.04 2026

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-tv:
    runs-on: ubuntu-latest

    env:
      TZ: Europe/Athens   # ✅ σωστή Ελλάδα ώρα παντού

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install xmlbuilder2

      - name: Create data folder
        run: mkdir -p data

      - name: Set current date (Athens Time)
        run: echo "TODAY=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Fetch Vodafone JSON (EPG)
        run: |
          curl -L -o data/raw.json "https://www.vodafone.gr/api/tv/programma-live/$TODAY"

      - name: Generate XMLTV + M3U
        run: node scripts/generate.js

      - name: Commit & push
        run: |
          git config user.name "epg-bot"
          git config user.email "bot@example.com"

          git add data/

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "EPG update $TODAY"
          git push
